{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>e shop</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

/* BODY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
}


/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:linear-gradient(180deg,#667eea,#764ba2);
padding-top:20px;
position:fixed;
left:0;
top:0;
}

/* Sidebar title */

.sidebar h2{
color:#e2e8f0;
text-align:center;
margin-bottom:30px;
}

/* Sidebar links */

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
font-size:16px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}


/* LOGO */

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:70px;
height:auto;
display:block;
margin:0 auto;
}

.logo h2{
font-size:18px;
margin-top:5px;
color:white;
}


/* MAIN CONTENT */

.main-content{
margin-left:220px;
padding:20px;
}


/* TOP SECTION */

.top-section{
background:#f5f5f5;
padding:30px;
border-radius:10px;
}


/* TITLE */

.title{
text-align:center;
margin-top:10px;
font-size:30px;
}


/* SEARCH BAR */

.topbar{
display:flex;
justify-content:center;
margin-top:15px;
margin-bottom:30px;
}

.topbar input{
width:350px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.topbar button{
padding:10px 15px;
margin-left:5px;
background:#ff9900;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.topbar button:hover{
background:black;
}


/* PRODUCTS GRID */

.products{
display:grid;
grid-template-columns:repeat(4,220px);
justify-content:center;
gap:40px;
padding:30px;
}


/* PRODUCT CARD */

.product-card{
width:220px;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
padding:15px;
}

.product-card img{
width:100%;
height:180px;
object-fit:contain;
}

.product-card:hover{
transform:translateY(-8px);
transition:0.3s;
}


/* PRICE */

.price{
color:#2e7d32;
font-weight:bold;
}


/* ADD TO CART BUTTON */

.add-btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#17a2b8;
color:white;
text-decoration:none;
border-radius:5px;
}

.add-btn:hover{
background:#0f7c8a;
}

/* SLIDER */

.slider{
width:100%;
height:350px;
overflow:hidden;
border-radius:10px;
margin-bottom:25px;
position:relative;
}

/* sliding container */

.slides{
display:flex;
width:100%;
height:100%;
animation:slide 12s infinite;
}

/* image */

.slides img{
width:100%;
height:100%;
object-fit:cover;
flex-shrink:0;
}

/* animation */

@keyframes slide{

0%{
transform:translateX(0);
}

25%{
transform:translateX(0);
}

33%{
transform:translateX(-100%);
}

58%{
transform:translateX(-100%);
}

66%{
transform:translateX(-200%);
}

91%{
transform:translateX(-200%);
}

100%{
transform:translateX(0);
}

}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<img src="{% static 'images/logo.png' %}" alt="E-Shop Logo">
<h2>e-shop</h2>
</div>

<a href="/profile/">👤 Profile</a>
<a href="/cart/">🛒 Cart</a>
<a href="/my-orders/">📦 My Orders</a>
<a href="/shop/">🛍 Shop</a>
<a href="/logout/">🚪 Logout</a>

</div>


<!-- MAIN CONTENT -->

<div class="main-content">

<div class="top-section">

<div class="slider">

<div class="slides">

<img src="{% static 'images/banner1.jpg' %}">
<img src="{% static 'images/banner2.jpg' %}">
<img src="{% static 'images/banner3.jpg' %}">

</div>

</div>

<h2 class="title">Our Products</h2>

<div class="topbar">
<form method="GET" action="/search/">
<input type="text" placeholder="Search products..." name="query">
<button type="submit">Search</button>
</form>
</div>

</div>


<div class="products">

{% for product in products %}

<div class="product-card">

<img src="{{ product.image.url }}">

<a href="/product/{{ product.id }}/">
<h3>{{ product.name }}</h3>
</a>

<p class="price">₹{{ product.price }}</p>

<a href="/add-to-cart/{{ product.id }}/" class="add-btn">
Add to Cart
</a>

</div>

{% endfor %}

</div>

</div>

</body>
</html>

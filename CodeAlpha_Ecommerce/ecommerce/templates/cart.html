{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

/* FORCE WHITE BACKGROUND */

body{
background:white !important;
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

/* NAVBAR */

.navbar{
background:#667eea;
padding:15px;
display:flex;
gap:25px;

}

.navbar a{
color:white;

text-decoration:none;
font-weight:bold;
}

/* CART TITLE */

h2{
text-align:center;
margin:30px;
}

/* TABLE DESIGN */

table{
width:80%;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border-collapse:collapse;
}

th,td{
padding:15px;
text-align:center;
}

th{
background:#667eea;
color:white;
}

/* REMOVE BUTTON */

.remove{
color:red;
text-decoration:none;
font-weight:bold;
}

/* CHECKOUT BUTTON */

.checkout{
background:#17a2b8;
color:white;
padding:8px 12px;
border-radius:5px;
text-decoration:none;
}

.checkout:hover{
background:#0f7c8a;
}

/* TOTAL */

.total{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/shop/">🛍 Shop</a>
<a href="/cart/">🛒 Cart</a>
</div>

<h2>Your Cart</h2>

<table>

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Action</th>
<th>Checkout</th>
</tr>

{% for item in cart_items %}

<tr>

<td>{{ item.product.name }}</td>

<td>₹{{ item.product.price }}</td>

<td>{{ item.quantity }}</td>

<td>
<a href="/remove/{{ item.id }}/" class="remove">
Remove
</a>
</td>

<td>
<a href="/checkout/" class="checkout">
Proceed to Checkout ✅
</a>
</td>

</tr>

{% endfor %}

</table>

<h3 class="total">
Total: ₹{{ total }}
</h3>

</body>
</html>

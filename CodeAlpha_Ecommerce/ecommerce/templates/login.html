<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#667eea,#764ba2,#ff9966);
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5563d1;
}

a{
    text-decoration:none;
    color:#667eea;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p style="margin-top:15px;">
Don't have an account?
<a href="/signup/">Sign Up</a>
</p>

</div>

</body>
</html>

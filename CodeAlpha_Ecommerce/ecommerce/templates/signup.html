<!DOCTYPE html>
<html>
<head>

<title>Sign Up</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#ff758c,#ff7eb3,#667eea);
}

.signup-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:340px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#ff758c;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e84a6a;
}

a{
    text-decoration:none;
    color:#ff758c;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

<p style="margin-top:15px;">
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
